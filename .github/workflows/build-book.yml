name: Build and deploy book

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; don't cancel an in-progress one
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::bookdown
            any::rmarkdown
            any::knitr
            any::tidyverse
            any::patchwork
            any::ggthemes
            any::ggfortify
            any::agricolae
            any::calendar
            any::officer
            any::flextable

      - name: Build book (gitbook)
        run: ./_build.sh

      # Only package the site for deployment on real pushes / scheduled /
      # manual runs. Pull requests still build above (as a check) but are
      # not deployed.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    # Never deploy from a pull request
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
